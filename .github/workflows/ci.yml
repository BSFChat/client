name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            platform: macos
            qt_arch: clang_64
          - os: windows-latest
            platform: windows
            qt_arch: win64_msvc2022_64
          - os: ubuntu-24.04
            platform: linux
            qt_arch: gcc_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.0'
          modules: 'qtmultimedia'
          cache: true

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libgl1-mesa-dev libxkbcommon-dev \
            libxcb-xkb-dev libxcb-cursor-dev libxcb-keysyms1-dev libxcb-shape0-dev \
            libxcb-randr0-dev libxcb-icccm4-dev libxcb-image0-dev libegl1-mesa-dev \
            libpulse-dev libasound2-dev
          pip3 install --break-system-packages cmake==3.30.5

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install openssl@3 create-dmg
          # Pin CMake to 3.30 to avoid cmake_minimum_required compat issues
          # with libdatachannel's vendored deps (plog, usrsctp)
          pip3 install --break-system-packages cmake==3.30.5

      - name: Install Windows dependencies
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install nsis -y
          Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

      - name: Configure (macOS)
        if: matrix.platform == 'macos'
        run: |
          export PATH="$HOME/Library/Python/3.12/bin:$HOME/Library/Python/3.13/bin:$PATH"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -Wno-dev \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)

      - name: Configure (Linux)
        if: matrix.platform == 'linux'
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cmake -B build -DCMAKE_BUILD_TYPE=Release -Wno-dev

      - name: Configure (Windows)
        if: matrix.platform == 'windows'
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release -Wno-dev

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Test
        run: ctest --test-dir build --output-on-failure -C Release

      # === macOS: Import signing certificate ===
      - name: Import code signing certificate
        if: matrix.platform == 'macos'
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PWD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          # Import certificate
          echo "$MACOS_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 -P "$MACOS_CERTIFICATE_PWD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH login.keychain-db
          # Extract identity name for codesign
          IDENTITY=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | grep "Developer ID" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "Signing identity: $IDENTITY"

      # === macOS: Create .dmg ===
      - name: Package macOS .dmg
        if: matrix.platform == 'macos'
        run: |
          cd build
          # Find the .app bundle
          APP_PATH=$(find . -name "bsfchat-app.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app bundle found!"
            find . -name "bsfchat-app*" -type f
            exit 1
          fi
          echo "Found app bundle: $APP_PATH"
          # Deploy Qt frameworks and QML modules into the bundle
          macdeployqt "$APP_PATH" -always-overwrite -qmldir=${{ github.workspace }}/qml -verbose=2
          # Ensure QML modules are copied (macdeployqt often misses them)
          QT_QML_DIR="${QML2_IMPORT_PATH:-$(dirname $(dirname $(which macdeployqt)))/qml}"
          echo "Looking for QML modules in: $QT_QML_DIR"
          if [ -d "$QT_QML_DIR" ]; then
            echo "Copying QML modules from $QT_QML_DIR"
            QML_DEST="$APP_PATH/Contents/Resources/qml"
            mkdir -p "$QML_DEST"
            for mod in QtQuick QtQml Qt/labs; do
              if [ -d "$QT_QML_DIR/$mod" ]; then
                cp -R "$QT_QML_DIR/$mod" "$QML_DEST/"
                echo "  Copied $mod"
              fi
            done
            echo "QML modules copied: $(ls $QML_DEST/)"
          else
            echo "WARNING: QML dir not found at $QT_QML_DIR"
            # Try finding it
            find /Users/runner -name "QtQuick" -type d -path "*/qml/*" 2>/dev/null | head -3
          fi
          # Set qt.conf to tell Qt where QML modules are
          cat > "$APP_PATH/Contents/Resources/qt.conf" << 'QTCONF'
          [Paths]
          Plugins = PlugIns
          Imports = Resources/qml
          QmlImports = Resources/qml
          QTCONF
          # Code sign
          if [ -n "$CODESIGN_IDENTITY" ]; then
            codesign --force --deep --sign "$CODESIGN_IDENTITY" \
              --options runtime --timestamp "$APP_PATH"
            echo "Signed with: $CODESIGN_IDENTITY"
          else
            codesign --force --deep --sign - "$APP_PATH"
          fi
          # Create .dmg
          create-dmg \
            --volname "BSFChat" \
            --window-size 600 400 \
            --icon "$(basename $APP_PATH)" 175 200 \
            --app-drop-link 425 200 \
            --no-internet-enable \
            "BSFChat-macOS.dmg" "$APP_PATH" || true
          # Fallback to zip
          if [ ! -f "BSFChat-macOS.dmg" ]; then
            ditto -c -k --keepParent "$APP_PATH" BSFChat-macOS.dmg
          fi

      - name: Upload macOS artifact
        if: matrix.platform == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: BSFChat-macOS
          path: build/BSFChat-macOS.dmg

      # === Windows: Create NSIS installer ===
      - name: Package Windows installer
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          mkdir dist
          # Find the exe (could be in Release/ or directly in build/)
          $exe = Get-ChildItem -Path build -Recurse -Filter "bsfchat-app.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "bsfchat-app.exe not found"; exit 1 }
          Write-Host "Found exe at: $($exe.FullName)"
          Copy-Item $exe.FullName dist\
          windeployqt --release --no-translations --qmldir qml dist\bsfchat-app.exe

          # Copy runtime DLLs that windeployqt doesn't handle
          # OpenSSL (from Qt installation or vcpkg/system)
          $openssl_dlls = @("libssl-3-x64.dll", "libcrypto-3-x64.dll")
          $search_paths = @(
            $env:QT_ROOT_DIR,
            "${env:IQTA_TOOLS}\..",
            "D:\a\client\Qt",
            "C:\vcpkg\installed\x64-windows\bin",
            "C:\Program Files\OpenSSL-Win64\bin",
            "C:\Program Files\Common Files\SSL",
            "${env:ProgramFiles}"
          ) | Where-Object { $_ -and (Test-Path $_ -ErrorAction SilentlyContinue) }

          foreach ($dll in $openssl_dlls) {
            $found = $null
            foreach ($path in $search_paths) {
              $found = Get-ChildItem -Path $path -Recurse -Filter $dll -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { break }
            }
            if ($found) {
              Copy-Item $found.FullName dist\
              Write-Host "Copied $dll from $($found.FullName)"
            } else {
              Write-Warning "Could not find $dll"
            }
          }

          # Opus (from our build - FetchContent puts it somewhere in build/_deps)
          $opus_dll = Get-ChildItem -Path build -Recurse -Filter "opus.dll" | Select-Object -First 1
          if ($opus_dll) {
            Copy-Item $opus_dll.FullName dist\
            Write-Host "Copied opus.dll from $($opus_dll.FullName)"
          } else {
            Write-Warning "Could not find opus.dll"
          }

          # libdatachannel DLL
          $dc_dll = Get-ChildItem -Path build -Recurse -Filter "datachannel*.dll" | Select-Object -First 1
          if ($dc_dll) {
            Copy-Item $dc_dll.FullName dist\
            Write-Host "Copied $($dc_dll.Name)"
          }

          # MSVC runtime (usually handled by windeployqt, but be safe)
          Write-Host "Final dist contents:"
          Get-ChildItem dist\ | Select-Object Name, Length

          Copy-Item installer.nsi dist\
          # Brand icon for the NSIS installer chrome. installer.nsi
          # references "BSFChat.ico" relative to the .nsi file, so
          # ship it next to the script in dist\.
          Copy-Item branding\BSFChat.ico dist\
          cd dist
          makensis installer.nsi

      - name: Upload Windows artifact
        if: matrix.platform == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: BSFChat-Windows
          path: dist/BSFChat-Setup.exe

      # === Linux: Create tarball ===
      - name: Package Linux tarball
        if: matrix.platform == 'linux'
        run: |
          mkdir -p BSFChat/bin BSFChat/lib BSFChat/plugins BSFChat/share
          cp build/bsfchat-app BSFChat/bin/
          # Brand icon — placed at share/BSFChat.png so the
          # generated .desktop file's `Icon=` entry resolves
          # whether the user installs into ~/.local/share/ via
          # xdg-desktop-menu or just runs from the extracted dir.
          cp branding/BSFChat.png BSFChat/share/
          cat > BSFChat/share/bsfchat.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=BSFChat
          GenericName=Chat
          Comment=Self-hosted Discord-style chat
          Exec=bsfchat.sh %u
          Icon=BSFChat
          Terminal=false
          Categories=Network;InstantMessaging;Chat;
          MimeType=x-scheme-handler/bsfchat;
          DESKTOP
          # Create a simple launch script
          cat > BSFChat/bsfchat.sh << 'SCRIPT'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          export LD_LIBRARY_PATH="$DIR/lib:$LD_LIBRARY_PATH"
          export QT_PLUGIN_PATH="$DIR/plugins"
          exec "$DIR/bin/bsfchat-app" "$@"
          SCRIPT
          chmod +x BSFChat/bsfchat.sh
          tar czf BSFChat-linux-x86_64.tar.gz BSFChat/

      - name: Upload Linux artifact
        if: matrix.platform == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: BSFChat-Linux
          path: BSFChat-linux-x86_64.tar.gz

  # Create GitHub Release on tag push
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/BSFChat-macOS/BSFChat-macOS.dmg
            artifacts/BSFChat-Windows/BSFChat-Setup.exe
            artifacts/BSFChat-Linux/BSFChat-linux-x86_64.tar.gz
          generate_release_notes: true
